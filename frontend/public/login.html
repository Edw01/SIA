<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIA | Iniciar Sesión</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
        }
        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-card h1 {
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }
        .login-card p {
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }
        .login-btn {
            width: 100%;
            margin-top: 1.5rem;
        }
    </style>
</head>
<body>
    <article class="glass-card login-card">
        <h1>SIA Portal</h1>
        <p>Sistema de Inscripción de Asignaturas</p>
        
        <form id="login-form" class="dynamic-form">
            <div class="input-group" style="text-align: left;">
                <label for="rut">RUT (Ej: 12345678-9)</label>
                <input type="text" id="rut" placeholder="Ingresa tu RUT" required>
            </div>
            <button type="submit" class="btn-primary login-btn">Ingresar al Sistema</button>
        </form>
        
        <div id="login-alert" class="alert hidden" style="margin-top: 1rem; display: none;"></div>
    </article>

    <script src="js/login.js"></script>
</body>
</html>
